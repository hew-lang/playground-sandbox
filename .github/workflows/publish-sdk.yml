name: Publish to GitHub Packages

# GitHub Packages is the sole canonical registry for @hew-lang/playground-sandbox.
# It is not mirrored to npmjs (it depends on the GitHub-Packages-only
# @hew-lang/sandbox-wasm and @hew-lang/sandbox-vm).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run packaging checks without publishing"
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@hew-lang"

      - name: Show package metadata
        run: npm pkg get name version

      - name: Install dependencies
        run: npm ci

      - name: Validate SDK package
        run: |
          npm run typecheck:sdk
          npm run test:sdk
          npm pack --ignore-scripts --dry-run

      - name: Check whether version is already published
        id: guard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@hew-lang/playground-sandbox@${VERSION}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "Version ${VERSION} already on GitHub Packages; skipping real publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run publish
        if: ${{ inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --dry-run --registry https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        if: ${{ !inputs.dry_run && steps.guard.outputs.exists == 'false' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry https://npm.pkg.github.com
